<head>

    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

  <meta name="mobile-web-app-capable" content="yes">

  <style>
    :root {
      color-scheme: light;
      --shell-cream: #f8f1e7;
      --shell-cream-deep: #f3e5d5;
      --shell-clay: #b65e48;
      --shell-clay-soft: rgba(182, 94, 72, 0.14);
      --shell-tea: #708a6e;
      --shell-ink: #2c1d18;
      --shell-muted: #6c564c;
      --shell-card: rgba(255, 255, 255, 0.82);
      --shell-line: rgba(234, 216, 196, 0.95);
      --shell-shadow: 0 24px 60px rgba(90, 53, 38, 0.12);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(112, 138, 110, 0.18), transparent 32%),
        radial-gradient(circle at top right, rgba(182, 94, 72, 0.16), transparent 28%),
        linear-gradient(180deg, #f6ebdd 0%, var(--shell-cream) 55%, #fdfbf8 100%);
      font-family: "Iowan Old Style", "Palatino Linotype", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", serif;
      color: var(--shell-ink);
    }

    body {
      overflow-x: hidden;
    }

    #app-loading-shell {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      justify-content: center;
      background: rgba(248, 241, 231, 0.96);
      transition: opacity 160ms ease;
    }

    #app-loading-shell.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .shell-frame {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .shell-topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: min(100%, 320px);
      padding: 0;
      text-align: center;
    }

    .shell-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      min-width: 0;
      width: 100%;
    }

    .shell-seal {
      width: clamp(84px, 18vw, 108px);
      height: clamp(84px, 18vw, 108px);
      flex: none;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 243, 233, 0.95), rgba(255, 243, 233, 0) 28%),
        linear-gradient(145deg, #cb775d, var(--shell-clay) 58%, #8f4737 100%);
      border: 1px solid rgba(255, 245, 238, 0.52);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 18px 40px rgba(160, 84, 63, 0.24);
      overflow: hidden;
    }

    .shell-seal svg {
      width: 76%;
      height: 76%;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(31, 41, 55, 0.12));
    }

    .shell-brand-copy {
      min-width: 0;
      max-width: 300px;
    }

    .shell-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
    }

    .shell-loader {
      position: relative;
      width: 34px;
      height: 30px;
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
    }

    .shell-pot {
      position: relative;
      width: 28px;
      height: 17px;
      border-radius: 0 0 9px 9px;
      background: linear-gradient(180deg, #cf7a5f 0%, #b65e48 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .shell-pot::before {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      top: -2px;
      height: 2px;
      border-radius: 3px;
      background: #8f4737;
    }

    .shell-steam {
      position: absolute;
      bottom: 17px;
      width: 4px;
      height: 13px;
      border-radius: 999px;
      background: rgba(182, 94, 72, 0.52);
      opacity: 0;
      animation: shell-steam 1.2s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .shell-steam.s1 {
      left: 5px;
      animation-delay: 0s;
    }

    .shell-steam.s2 {
      left: 14px;
      animation-delay: 0.2s;
    }

    .shell-steam.s3 {
      left: 23px;
      animation-delay: 0.4s;
    }

    @keyframes shell-steam {
      0% {
        opacity: 0;
        transform: translateY(0) scaleY(0.7);
      }
      35% {
        opacity: 0.9;
      }
      100% {
        opacity: 0;
        transform: translateY(-7px) scaleY(1.1);
      }
    }

    .shell-title {
      margin: 0;
      font-size: clamp(26px, 5vw, 34px);
      line-height: 1.08;
      letter-spacing: 0.01em;
      text-wrap: balance;
    }

    .shell-assistive {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 720px) {
      .shell-frame {
        padding: 18px 14px;
      }

      .shell-topbar {
        width: min(100%, 300px);
      }

      .shell-title {
        font-size: clamp(26px, 8vw, 34px);
      }
    }
  </style>
</head>
<body style="margin:0;min-height:100%;overflow-x:hidden;background:radial-gradient(circle at top left, rgba(112, 138, 110, 0.18), transparent 32%),radial-gradient(circle at top right, rgba(182, 94, 72, 0.16), transparent 28%),linear-gradient(180deg, #f6ebdd 0%, #f8f1e7 55%, #fdfbf8 100%);font-family:&quot;Iowan Old Style&quot;,&quot;Palatino Linotype&quot;,&quot;PingFang SC&quot;,&quot;Hiragino Sans GB&quot;,&quot;Noto Sans CJK SC&quot;,&quot;Microsoft YaHei&quot;,serif;color:#2c1d18;">
  <div id="app-loading-shell" aria-live="polite" aria-busy="true" style="position:fixed;inset:0;z-index:9999;display:flex;justify-content:center;align-items:stretch;background:rgba(248, 241, 231, 0.96);transition:opacity 160ms ease;">
    <div class="shell-frame" style="width:100%;min-height:100vh;box-sizing:border-box;padding:24px 18px;display:flex;align-items:center;justify-content:center;">
      <div class="shell-topbar">
        <div class="shell-brand">
          <div class="shell-seal" aria-hidden="true">

              <rect x="36" y="36" width="440" height="440" rx="112" fill="#FFF7ED"/>
              <path d="M164 154 H348 C361 154 372 165 372 178 V326 C358 326 347 337 347 351 C347 365 358 376 372 376 V382 C372 395 361 406 348 406 H164 C151 406 140 395 140 382 V376 C154 376 165 365 165 351 C165 337 154 326 140 326 V178 C140 165 151 154 164 154Z" fill="white" stroke="#1F2937" stroke-width="18" stroke-linejoin="round"/>
              <g transform="translate(0 -2)">
                <path d="M221 118 C225 101 239 90 256 90 C273 90 287 101 291 118 C297 109 307 104 319 104 C337 104 351 118 351 136 C365 138 376 149 376 164 C376 182 362 196 344 196 H168 C150 196 136 182 136 164 C136 149 147 138 161 136 C161 118 175 104 193 104 C205 104 215 109 221 118Z" fill="white" stroke="#1F2937" stroke-width="18" stroke-linejoin="round"/>
                <line x1="190" y1="206" x2="322" y2="206" stroke="#F59E0B" stroke-width="18" stroke-linecap="round"/>
              </g>
              <line x1="186" y1="244" x2="326" y2="244" stroke="#1F2937" stroke-width="16" stroke-linecap="round"/>
              <line x1="186" y1="286" x2="326" y2="286" stroke="#1F2937" stroke-width="16" stroke-linecap="round"/>
              <line x1="186" y1="328" x2="258" y2="328" stroke="#1F2937" stroke-width="16" stroke-linecap="round"/>
              <path d="M286 326 L316 356 L366 296" stroke="#F59E0B" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="shell-brand-copy">
            <h1 class="shell-title">UniqueDing's Kitchen</h1>
            <div class="shell-loading" aria-hidden="true">
              <span class="shell-loader">
                <span class="shell-steam s1"></span>

      </div>
    </div>
    <div class="shell-assistive">Loading UniqueDing's Kitchen.</div>
  </div>

  <script>
    (function () {
      var shell = document.getElementById('app-loading-shell');
      if (!shell) {
        return;
      }

      var hidden = false;

      function hideShell() {
        if (hidden) {
          return;
        }
        hidden = true;
        shell.classList.add('is-hidden');
        shell.setAttribute('aria-hidden', 'true');
        window.setTimeout(function () {
          shell.remove();
        }, 180);
      }

      window.addEventListener('unique-ding-shell-ready', function () {
        hideShell();
      }, { once: true });
    })();
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
